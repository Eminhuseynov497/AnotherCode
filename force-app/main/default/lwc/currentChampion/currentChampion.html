<template>
    <lightning-card class="custom-champion-card">
        <span slot="title">
            <span class="card-title">🏆 Current Champion</span>
        </span>

        <div if:true={champion} class="champion-content">
            <div class="slds-media slds-media_center slds-m-around_medium">
                <div class="slds-media__figure logo-wrapper">
                    <img if:true={hasLogo} src={champion.teamLogoUrl} alt={champion.teamName}
                         width="80" height="80" class="team-logo" />
                    
                    <div if:false={hasLogo} class="initials-circle" style={initialsStyle}>
                        <span class="initials-text">{teamInitials}</span>
                    </div>
                </div>
                <div class="slds-media__body">
                    <h2 class="team-name">{champion.teamName}</h2>
                    <p class="slds-text-body_small league-info">
                        <strong>League:</strong> {champion.leagueName}
                    </p>
                    <p class="slds-text-body_small season-info">
                        <strong>Season:</strong> {champion.season}
                    </p>
                </div>
            </div>
        </div>

        <div if:false={champion} class="slds-var-m-around_medium no-champion">
            <p class="slds-text-color_weak">No champion found for this sport.</p>
        </div>

        <div if:true={error} class="slds-var-m-around_medium slds-text-color_error">
            Error: {errorMessage}
        </div>
    </lightning-card>
</template>
