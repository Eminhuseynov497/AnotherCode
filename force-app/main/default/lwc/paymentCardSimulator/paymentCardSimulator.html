<template>
    <div class="slds-box slds-theme_default slds-p-around_medium">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Payment Method</h2>
        
        <div class="slds-grid slds-gutters slds-m-bottom_medium">
            <div class="slds-col slds-size_1-of-4" onclick={selectCreditCard}>
                <div class={creditCardClass}>
                    <lightning-icon icon-name="utility:card" size="small"></lightning-icon>
                    <span class="slds-m-left_x-small">Credit Card</span>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4" onclick={selectPayPal}>
                <div class={payPalClass}>
                    <lightning-icon icon-name="utility:moneybag" size="small"></lightning-icon>
                    <span class="slds-m-left_x-small">PayPal</span>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4" onclick={selectApplePay}>
                <div class={applePayClass}>
                    <lightning-icon icon-name="utility:mobile" size="small"></lightning-icon>
                    <span class="slds-m-left_x-small">Apple Pay</span>
                </div>
            </div>
            <div class="slds-col slds-size_1-of-4" onclick={selectGooglePay}>
                <div class={googlePayClass}>
                    <lightning-icon icon-name="utility:mobile" size="small"></lightning-icon>
                    <span class="slds-m-left_x-small">Google Pay</span>
                </div>
            </div>
        </div>

        <div if:true={isCreditCard}>
            <div class="card-container">
                <div class={cardWrapperClass}>
                    <div class="card-front">
                        <div class="card-content">
                            <div class="card-top">
                                <span class="card-chip"></span>
                                <span class="card-type" id="cardLogo">VISA</span>
                            </div>
                            <div class="card-number" id="displayCardNumber">•••• •••• •••• ••••</div>
                            <div class="card-bottom">
                                <div class="card-expiry">
                                    <span class="label">Expires</span>
                                    <span class="value" id="displayExpiry">MM/YY</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="card-magnetic-stripe"></div>
                        <div class="cvv-area">
                            <span class="cvv-label">CVV</span>
                            <span class="cvv-value" id="displayCVV">•••</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="slds-grid slds-gutters slds-m-top_medium">
                <div class="slds-col slds-size_1-of-2">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="cardNumberInput">Card Number</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="cardNumberInput" 
                                   class="slds-input" 
                                   placeholder="1234 5678 9012 3456"
                                   oninput={handleCardNumberInput}
                                   value={cardNumber}
                                   maxlength="19"
                                   inputmode="numeric"
                                   autocomplete="cc-number" />
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="expiryInput">Expiry (MM/YY)</label>
                        <div class="slds-form-element__control">
                            <input type="text" id="expiryInput" 
                                   class="slds-input" 
                                   placeholder="MM/YY"
                                   oninput={handleExpiryInput}
                                   value={expiryDate}
                                   maxlength="5"
                                   inputmode="numeric" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="slds-grid slds-gutters slds-m-top_medium">
                <div class="slds-col slds-size_1-of-3">
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="cvvInput">CVV</label>
                        <div class="slds-form-element__control">
                            <input type="password" id="cvvInput" 
                                   class="slds-input" 
                                   placeholder="123"
                                   oninput={handleCvvInput}
                                   value={cvv}
                                   maxlength="3"
                                   inputmode="numeric"
                                   onfocus={handleCvvFocus}
                                   onblur={handleCvvBlur} />
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-3 slds-text-align_right slds-align_absolute-center">
                    <lightning-button variant="brand" label="Pay Now" onclick={handlePay}></lightning-button>
                </div>
            </div>
        </div>

        <div if:true={isPayPal}>
            <div class="paypal-container slds-text-align_center slds-p-vertical_medium">
                <lightning-icon icon-name="utility:moneybag" size="large"></lightning-icon>
                <h3 class="slds-text-heading_medium">PayPal</h3>
                
                <div if:false={payPalLoggedIn} class="slds-m-top_medium">
                    <div class="slds-grid slds-gutters slds-m-bottom_small slds-grid_align-center">
                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                            <lightning-input label="Email" value={payPalEmail} oninput={handlePayPalEmail}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-3">
                            <lightning-input label="Password" type="password" value={payPalPassword} oninput={handlePayPalPassword}></lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-text-align_left">
                            <lightning-button variant="brand" label="Log in to PayPal" onclick={handlePayPalLogin}></lightning-button>
                        </div>
                    </div>
                    <p if:true={payPalLoginError} class="slds-text-color_error">{payPalLoginError}</p>
                </div>
                
                <div if:true={payPalLoggedIn} class="slds-m-top_medium">
                    <p class="slds-text-body_regular">Logged in as <strong>{payPalEmail}</strong></p>
                    <lightning-button variant="brand" label="Pay with PayPal" onclick={handlePay} class="slds-m-top_medium"></lightning-button>
                </div>
            </div>
        </div>

        <div if:true={isApplePay}>
            <div class="applepay-container slds-text-align_center slds-p-vertical_medium">
                <lightning-icon icon-name="utility:mobile" size="large"></lightning-icon>
                <h3 class="slds-text-heading_medium">Apple Pay</h3>
                
                <div class="slds-m-top_medium">
                    <div class="apple-pay-button" onclick={handleApplePay}>
                        <span class="apple-pay-logo">Pay</span>
                    </div>
                    <p if:true={applePayBiometry} class="slds-text-body_regular slds-m-top_small">
                        <lightning-icon icon-name="utility:user" size="x-small"></lightning-icon> 
                        Authenticate with Face ID / Touch ID
                    </p>
                    <p if:true={applePaySuccess} class="slds-text-color_success slds-m-top_small">Authenticated successfully!</p>
                </div>
            </div>
        </div>

        <div if:true={isGooglePay}>
            <div class="googlepay-container slds-text-align_center slds-p-vertical_medium">
                <lightning-icon icon-name="utility:mobile" size="large"></lightning-icon>
                <h3 class="slds-text-heading_medium">Google Pay</h3>
                
                <div class="slds-m-top_medium">
                    <div class="google-pay-button" onclick={handleGooglePay}>
                        <span class="google-pay-logo">G Pay</span>
                    </div>
                    <div if:true={showGooglePayCards} class="slds-m-top_medium slds-text-align_left slds-grid_center">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Select a card</label>
                            <div class="slds-radio">
                                <input type="radio" id="gpCard1" name="gpCard" checked onchange={selectGooglePayCard} value="•••• 1234"/>
                                <label for="gpCard1">•••• 1234</label>
                            </div>
                            <div class="slds-radio">
                                <input type="radio" id="gpCard2" name="gpCard" onchange={selectGooglePayCard} value="•••• 5678"/>
                                <label for="gpCard2">•••• 5678</label>
                            </div>
                            <lightning-button variant="brand" label="Pay with Google Pay" onclick={handlePay} class="slds-m-top_medium"></lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div if:true={showToast} class="slds-notify slds-notify_toast slds-theme_success slds-m-top_medium" role="status">
            <span class="slds-assistive-text">Success</span>
            <h2 class="slds-text-heading_small">Payment Successful!</h2>
            <p>{toastMessage}</p>
        </div>
    </div>
</template>
