<template>
    <lightning-card title="Event Dashboard">
        <div class="slds-m-around_medium dashboard-container">
            <!-- KPI Cards -->
            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <div class="kpi-card">
                        <span class="slds-text-heading_large kpi-value">{ticketsSold}</span>
                        <span class="slds-text-title kpi-label">Tickets Sold</span>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <div class="kpi-card">
                        <span class="slds-text-heading_large kpi-value">{totalTickets}</span>
                        <span class="slds-text-title kpi-label">Total Tickets</span>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <div class="kpi-card">
                        <span class="slds-text-heading_large kpi-value">{occupancyPercent}%</span>
                        <span class="slds-text-title kpi-label">Occupancy</span>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <div class="kpi-card">
                        <span class="slds-text-heading_large kpi-value">${totalRevenue}</span>
                        <span class="slds-text-title kpi-label">Revenue</span>
                    </div>
                </div>
            </div>

            <!-- Section Occupancy -->
            <div class="slds-m-top_large">
                <h2 class="slds-text-heading_medium section-title">Section Occupancy</h2>
                <template if:true={sectionOccupancy}>
                    <template for:each={sectionOccupancy} for:item="section">
                        <div key={section.sectionName} class="slds-m-bottom_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <div class="slds-col slds-size_1-of-3 section-name">{section.sectionName}</div>
                                <div class="slds-col slds-size_2-of-3">
                                    <progress class="section-progress" value={section.soldCount} max={section.totalCount}></progress>
                                    <span class="progress-percent">{section.percent}%</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </template>
            </div>

            <!-- Recent Orders -->
            <div class="slds-m-top_large">
                <h2 class="slds-text-heading_medium section-title">Recent Orders</h2>
                <table class="slds-table slds-table_cell-buffer slds-table_bordered emerald-table">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Fan</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template if:true={recentOrders}>
                            <template for:each={recentOrders} for:item="order">
                                <tr key={order.orderNumber}>
                                    <td>{order.orderNumber}</td>
                                    <td>{order.fanName}</td>
                                    <td>{order.orderDate}</td>
                                    <td>${order.totalAmount}</td>
                                    <td>{order.status}</td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={recentOrders}>
                            <tr><td colspan="5">No orders yet</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button variant="brand" label="Refresh" class="emerald-btn" onclick={handleRefresh}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
