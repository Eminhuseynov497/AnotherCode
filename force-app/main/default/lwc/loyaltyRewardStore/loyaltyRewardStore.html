<template>
    <div class="slds-box slds-theme_default slds-p-around_medium slds-m-bottom_small loyalty-store-container">
        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_medium slds-wrap">
            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-2 slds-m-bottom_x-small">
                <h2 class="slds-text-heading_medium slds-text-color_strong">
                    <lightning-icon icon-name="utility:rewards" size="small" class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                    Rewards Store
                </h2>
            </div>
            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-2 slds-text-align_right">
                <span class="slds-text-body_regular slds-text-color_weak">Your balance:</span>
                <span class="slds-text-heading_small slds-m-left_x-small slds-text-color_strong">
                    {fanBalance} <span class="slds-text-color_weak">points</span>
                </span>
            </div>
        </div>

        <div if:true={loading} class="slds-text-align_center slds-p-vertical_medium">
            <lightning-spinner variant="brand" size="medium"></lightning-spinner>
        </div>

        <div if:true={error} class="slds-notify slds-notify_alert slds-theme_error slds-m-top_medium" role="alert">
            <h2 class="slds-text-heading_small">{error}</h2>
        </div>

        <div if:true={rewards} class="slds-grid slds-wrap slds-gutters slds-m-bottom_medium">
            <template for:each={rewards} for:item="reward">
                <div key={reward.id} class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-medium-size_1-of-3 slds-p-vertical_x-small slds-p-horizontal_x-small">
                    <div class="slds-card reward-card">

                        <div if:true={reward.Image_URL__c} class="reward-image-container">
                            <img src={reward.Image_URL__c} alt={reward.Name} class="reward-image" />
                        </div>

                        <div class="slds-card__header">
                            <div class="slds-grid slds-gutters">
                                <div class="slds-col slds-size_1-of-2 slds-text-align_left">
                                    <h3 class="slds-text-heading_small slds-truncate" title={reward.Name}>
                                        {reward.Name}
                                    </h3>
                                    
                                    <div style="margin-top: 28px; margin-bottom: 24px;">
                                        <lightning-button
                                            label="Buy"
                                            onclick={handleBuy}
                                            data-id={reward.id}
                                            data-cost={reward.Points_Cost__c}
                                            data-name={reward.Name}
                                            variant="brand"
                                            disabled={reward.isDisabled}
                                        ></lightning-button>
                                    </div>
                                    
                                    <p if:true={reward.isDisabled} 
                                       class="slds-text-color_error slds-text-body_small" 
                                       style="white-space: nowrap; margin-top: 0px;">
                                        {reward.disabledReason}
                                    </p>
                                </div>
                                
                                <div class="slds-col slds-size_1-of-2 slds-text-align_right">
                                    <div class="slds-m-bottom_xxx-small">
                                        <span class="slds-badge slds-theme_info">{reward.Category__c}</span>
                                    </div>
                                    <div class="slds-m-bottom_xxx-small slds-text-body_regular">
                                        <span class="slds-text-color_weak">Cost:</span>
                                        <span class="slds-text-heading_small slds-text-color_strong">{reward.Points_Cost__c}</span>
                                        <span class="slds-text-color_weak"> pts</span>
                                    </div>
                                    <div class="slds-text-body_small">
                                        <span if:true={reward.Stock_Quantity__c}>
                                            Left: {reward.Stock_Quantity__c}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-card__body slds-p-horizontal_medium">
                            <p class="slds-text-body_regular slds-text-color_weak">
                                {reward.Description__c}
                            </p>
                        </div>

                        <div class="slds-card__footer"></div>
                    </div>
                </div>
            </template>
        </div>

        <div class="slds-text-align_center slds-p-vertical_medium slds-text-color_weak">
            <lightning-icon icon-name="utility:info" size="medium" class="slds-m-bottom_x-small"></lightning-icon>
            <p if:true={emptyRewards}>No rewards available at the moment.</p>
            <p if:false={emptyRewards}>Check back later for more rewards.</p>
        </div>
    </div>
</template>
